# `metadata` bucket тАФ finish-reason sub-keys. Source: PR #273
# v2/tracing/semconv-reference.mdx тЖТ "`metadata` Bucket тЖТ Finish reasons".
# HHAI-5104 owns the two explicitly-stable sub-keys (finish_reason,
# finish_reasons).
# HHAI-5105 will add the development sub-key `response_finish_reasons`
# (OpenInference alias for `finish_reasons`) into this same file.

groups:
  - id: registry.honeyhive.metadata.finish_reasons
    type: attribute_group
    display_name: HoneyHive Metadata Bucket тАФ Finish Reasons
    brief: >
      Finish-reason sub-keys of the `metadata` bucket. The scalar
      `finish_reason` is extracted as the first element of the source
      `gen_ai.response.finish_reasons` array; the full array is preserved
      in `finish_reasons` for multi-choice responses. All attributes in
      this group are stable.
    attributes:
      - id: honeyhive.metadata.finish_reason
        type: string
        stability: stable
        requirement_level: recommended
        brief: >
          Scalar model finish reason. Extracted as the first element of the
          source `gen_ai.response.finish_reasons` array (OTel GenAI,
          Traceloop) or set directly from `gen_ai.response.finish_reason`
          (OpenInference singular form).
        examples:
          - 'stop'
          - 'length'
          - 'tool_calls'
          - 'content_filter'

      - id: honeyhive.metadata.finish_reasons
        type: string[]
        stability: stable
        requirement_level: recommended
        brief: >
          Array of all model finish reasons (one entry per response choice).
          Mapped from `gen_ai.response.finish_reasons` across OTel GenAI,
          OpenInference, and Traceloop.
        examples:
          - ['stop']
          - ['stop', 'tool_calls']
