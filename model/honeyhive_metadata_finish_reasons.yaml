# `metadata` bucket — finish-reason sub-keys. Source: PR #273
# v2/tracing/semconv-reference.mdx → "`metadata` Bucket → Finish reasons".
# Holds the two stable sub-keys (`finish_reason`, `finish_reasons`) and
# the development-tier OpenInference compatibility alias
# (`response_finish_reasons`).

groups:
  - id: registry.honeyhive.metadata.finish_reasons
    type: attribute_group
    display_name: HoneyHive Metadata Bucket — Finish Reasons
    brief: >
      Finish-reason sub-keys of the `metadata` bucket. The scalar
      `finish_reason` is extracted as the first element of the source
      `gen_ai.response.finish_reasons` array; the full array is preserved
      in `finish_reasons` for multi-choice responses. Mixed stability:
      `finish_reason` and `finish_reasons` are stable; the
      `response_finish_reasons` OpenInference alias is development-tier.
    attributes:
      - id: honeyhive.metadata.finish_reason
        type: string
        stability: stable
        requirement_level: recommended
        brief: >
          Scalar model finish reason. Extracted as the first element of the
          source `gen_ai.response.finish_reasons` array (OTel GenAI,
          Traceloop) or set directly from `gen_ai.response.finish_reason`
          (OpenInference singular form).
        examples:
          - 'stop'
          - 'length'
          - 'tool_calls'
          - 'content_filter'
        annotations:
          source_mapping:
            otel_genai: gen_ai.response.finish_reasons
            openinference: gen_ai.response.finish_reason
            traceloop: gen_ai.response.finish_reasons

      - id: honeyhive.metadata.finish_reasons
        type: string[]
        stability: stable
        requirement_level: recommended
        brief: >
          Array of all model finish reasons (one entry per response choice).
          Mapped from `gen_ai.response.finish_reasons` across OTel GenAI,
          OpenInference, and Traceloop.
        examples:
          - ['stop']
          - ['stop', 'tool_calls']
        annotations:
          source_mapping:
            otel_genai: gen_ai.response.finish_reasons
            openinference: gen_ai.response.finish_reasons
            traceloop: gen_ai.response.finish_reasons

      - id: honeyhive.metadata.response_finish_reasons
        type: string[]
        stability: development
        requirement_level: opt_in
        brief: >
          Array of model finish reasons set by the OpenInference ingestion
          strategy alongside `metadata.finish_reasons` for backwards
          compatibility with older OpenInference versions that emitted the
          attribute under a `response_*` prefix. Both keys are stored when
          the source attribute is present.
        examples:
          - ['stop']
          - ['length', 'tool_calls']
        note: >
          Prefer `metadata.finish_reasons` (stable) for new code paths.
          This alias may be removed in a future minor release once
          OpenInference instrumentation has aged out.
        annotations:
          source_mapping:
            otel_genai: null
            openinference: gen_ai.response.finish_reasons
            traceloop: null
