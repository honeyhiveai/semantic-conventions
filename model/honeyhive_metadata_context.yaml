# `metadata` bucket — context-identifier sub-keys. Source: PR #273
# v2/tracing/semconv-reference.mdx → "`metadata` Bucket → Context
# identifiers". HHAI-5104 owns the six explicitly-stable sub-keys.
# HHAI-5105 will add the development sub-key `disable_http_tracing` into
# this same file.
#
# Note: `metadata.session_id` is an informational copy of the source
# OTel `session.id` attribute; it does NOT override the root `session_id`
# field used by the trace tree / timeline / graph / trajectory views.

groups:
  - id: registry.honeyhive.metadata.context
    type: attribute_group
    display_name: HoneyHive Metadata Bucket — Context Identifiers
    brief: >
      Context-identifier sub-keys of the `metadata` bucket — user, run,
      dataset, datapoint, tool-call, and an informational session-id copy.
      Used for filtering, joining, and dataset-evaluation lineage. All
      attributes in this group are stable.
    attributes:
      - id: honeyhive.metadata.session_id
        type: string
        stability: stable
        requirement_level: opt_in
        brief: >
          OTel session identifier (informational copy of the source
          `session.id` attribute). Does NOT override the root
          `session_id` field that drives session grouping.
        examples:
          - 'a1b2c3d4-5e6f-7890-abcd-ef0123456789'

      - id: honeyhive.metadata.user_id
        type: string
        stability: stable
        requirement_level: recommended
        brief: >
          User identifier. Mapped from the OpenInference `user.id` source
          attribute. Used for per-user filtering and aggregation.
        examples:
          - 'user_8f3c1d29'

      - id: honeyhive.metadata.run_id
        type: string
        stability: stable
        requirement_level: opt_in
        brief: >
          Evaluation run identifier (HoneyHive dataset run). Set when an
          event is part of an offline experiment / dataset evaluation.
        examples:
          - 'run_2025_q1_eval_42'

      - id: honeyhive.metadata.dataset_id
        type: string
        stability: stable
        requirement_level: opt_in
        brief: >
          Dataset identifier (HoneyHive dataset). Set when an event is
          part of a dataset evaluation.
        examples:
          - 'EXT-2630e2cde725c322d01fee0a'

      - id: honeyhive.metadata.datapoint_id
        type: string
        stability: stable
        requirement_level: opt_in
        brief: >
          Datapoint identifier within a dataset. Set when an event is
          part of a dataset evaluation.
        examples:
          - 'EXT-5578323c51630e91e001027c'

      - id: honeyhive.metadata.tool_call_id
        type: string
        stability: stable
        requirement_level: recommended
        brief: >
          Tool-call identifier. Present on tool-result spans; used to
          correlate the tool result back to the originating tool call in
          chat history. Mapped from `gen_ai.tool.call.id` across OTel GenAI,
          OpenInference, and Traceloop.
        examples:
          - 'call_abc123'
