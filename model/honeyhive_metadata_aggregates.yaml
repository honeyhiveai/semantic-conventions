# `metadata` bucket — session-level aggregate sub-keys. Source: PR #273
# v2/tracing/semconv-reference.mdx → "`metadata` Bucket → Session-level
# aggregates". HHAI-5104 owns the four explicitly-stable sub-keys.
# These are computed by the writer/normalizer from child events and are NOT
# user-set on non-session events. All four are only meaningful when
# `event_type == "session"`.

groups:
  - id: registry.honeyhive.metadata.aggregates
    type: attribute_group
    display_name: HoneyHive Metadata Bucket — Session-Level Aggregates
    brief: >
      Session-level aggregate sub-keys of the `metadata` bucket. Set on
      events where `event_type == "session"` by the writer/normalizer
      (rolled up from child events); not user-set on non-session events.
      Source for the Session Summary panel stats and the sessions table
      columns. All attributes in this group are stable.
    attributes:
      - id: honeyhive.metadata.num_events
        type: int
        stability: stable
        requirement_level: opt_in
        brief: >
          Total child event count for the session. Displayed as the
          "Num of Events" column in the sessions table and the "Number of
          children" stat in Session Summary. Initialized to 0 by the
          normalizer on session events.
        examples:
          - 12
        annotations:
          source_mapping:
            otel_genai: null
            openinference: null
            traceloop: null

      - id: honeyhive.metadata.num_model_events
        type: int
        stability: stable
        requirement_level: opt_in
        brief: >
          Model event count (children with `event_type == "model"`).
          Displayed as the "Num of LLM Requests" column in the sessions
          table. Initialized to 0 by the normalizer on session events.
        examples:
          - 4
        annotations:
          source_mapping:
            otel_genai: null
            openinference: null
            traceloop: null

      - id: honeyhive.metadata.has_feedback
        type: boolean
        stability: stable
        requirement_level: opt_in
        brief: >
          True when the session has at least one feedback annotation across
          its events.
        examples:
          - true
          - false
        annotations:
          source_mapping:
            otel_genai: null
            openinference: null
            traceloop: null

      - id: honeyhive.metadata.cost
        type: double
        stability: stable
        requirement_level: opt_in
        brief: >
          Aggregate cost in USD attributed to this session (rolled up across
          child spans by the normalizer). Displayed as the "Cost" stat in
          the Session Summary panel (formatted as `$X.XXXX`) and as the
          built-in Cost sizing option in the Trajectory view.
        examples:
          - 0.0123
          - 1.4521
        annotations:
          source_mapping:
            otel_genai: null
            openinference: null
            traceloop: null
