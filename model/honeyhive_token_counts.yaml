# HoneyHive metadata.* development-tier token-count sub-keys. Stable
# token counts (`prompt_tokens`, `completion_tokens`, `input_tokens`,
# `output_tokens`, `total_tokens`) live in HHAI-5104 owned files. This
# file covers the development-tier complements: prompt-cache and
# reasoning token counts.
groups:
  - id: registry.honeyhive.metadata.token_counts_development
    type: attribute_group
    display_name: HoneyHive Development Token Counts
    brief: >
      Development-tier metadata.* token-count attributes for prompt
      caching and reasoning models. Used by Anthropic prompt cache,
      OpenAI o-series, and Claude extended-thinking spans. Render in the
      Metadata sideview section.
    attributes:
      - id: honeyhive.metadata.cache_read_input_tokens
        type: int
        stability: development
        requirement_level: opt_in
        brief: 'Number of input tokens served from the provider prompt cache (Anthropic, OpenAI).'
        examples:
          - 1024
          - 0
        annotations:
          source_mapping:
            otel_genai: gen_ai.usage.cache_read_input_tokens
            openinference: gen_ai.usage.cache_read_input_tokens
            traceloop: gen_ai.usage.cache_read_input_tokens

      - id: honeyhive.metadata.cache_write_input_tokens
        type: int
        stability: development
        requirement_level: opt_in
        brief: 'Number of input tokens written to the provider prompt cache (Anthropic, Traceloop OTel).'
        examples:
          - 512
          - 0
        note: >
          Documented in the framework attribute mapping table but absent
          from the canonical metadata sub-key list in PR #273. Treated as
          a development gap to be reconciled when promoting prompt-cache
          accounting to stable.
        annotations:
          source_mapping:
            otel_genai: gen_ai.usage.cache_write_input_tokens
            openinference: null
            traceloop: gen_ai.usage.cache_write_input_tokens

      - id: honeyhive.metadata.reasoning_tokens
        type: int
        stability: development
        requirement_level: opt_in
        brief: >
          Internal reasoning tokens consumed by the model (OpenAI
          o-series, Claude extended thinking). These tokens are billed
          but not surfaced in the assistant message.
        examples:
          - 256
          - 0
        annotations:
          source_mapping:
            otel_genai: gen_ai.usage.reasoning_tokens
            openinference: gen_ai.usage.reasoning_tokens
            traceloop: gen_ai.usage.reasoning_tokens
