# `outputs` bucket — output data produced by the span (completions,
# responses, results). Source: PR #273 v2/tracing/semconv-reference.mdx →
# "`outputs` Bucket". HHAI-5104 owns the four explicitly-stable sub-keys
# (role, chat_history, tool_calls, text). HHAI-5105 will add the development
# sub-keys (content, value, function_call, name, message, result, author,
# invocation_id, finish_reason, status, error, choices, tool_call_id) into
# this same file.

groups:
  - id: registry.honeyhive.outputs
    type: attribute_group
    display_name: HoneyHive Outputs Bucket Attributes
    brief: >
      Sub-keys of the `outputs` bucket that select the chat-message rendering
      mode in the sideview, reconstruct flattened tool-call structures, and
      bypass bucket rendering for plain-text outputs. All attributes in this
      group are stable.
    attributes:
      - id: honeyhive.outputs.role
        type: string
        stability: stable
        requirement_level: opt_in
        brief: >
          Speaker role for the output message. Presence of this key triggers
          the chat-message rendering mode in the sideview (capitalised as the
          speaker label). When absent, the output renders in the generic
          markdown/JSON toggle view.
        examples:
          - 'assistant'
          - 'tool'
        annotations:
          source_mapping:
            otel_genai: null
            openinference: null
            traceloop: null

      - id: honeyhive.outputs.chat_history
        type: string
        stability: stable
        requirement_level: opt_in
        brief: >
          Array of output messages. When `outputs.role` is absent, the
          presence of this key still triggers chat-message rendering mode and
          the first element is rendered as the primary output. Stored as
          JSON when transported via OTLP; expected format matches
          `inputs.chat_history`.
        examples:
          - '[{"role":"assistant","content":"The answer is 42."}]'
        annotations:
          source_mapping:
            otel_genai: null
            openinference: null
            traceloop: null

      - id: honeyhive.outputs.tool_calls
        type: string
        stability: stable
        requirement_level: opt_in
        brief: >
          Array of tool-call objects (each with `id`, `function.name`,
          `function.arguments`). When set as flattened dot-notation keys
          (`tool_calls.0.id`, `tool_calls.0.function.name`, ...), the
          sideview reconstructs a proper `tool_calls` array before rendering.
          Each tool call is rendered as a named JSON block. Stored as JSON
          when transported via OTLP.
        examples:
          - '[{"id":"call_abc","function":{"name":"get_weather","arguments":"{\"city\":\"SF\"}"}}]'
        annotations:
          source_mapping:
            otel_genai: null
            openinference: null
            traceloop: null

      - id: honeyhive.outputs.text
        type: string
        stability: stable
        requirement_level: opt_in
        brief: >
          Plain-text output. When set, this string is used as the output
          value instead of the full `outputs` object; rendered in the
          standard markdown/JSON toggle view.
        examples:
          - 'The weather in San Francisco is 68F and sunny.'
        annotations:
          source_mapping:
            otel_genai: null
            openinference: null
            traceloop: null
