# `metadata` bucket тАФ token-count sub-keys. Source: PR #273
# v2/tracing/semconv-reference.mdx тЖТ "`metadata` Bucket тЖТ Token counts".
# HHAI-5104 owns the five explicitly-stable sub-keys.
# HHAI-5105 will add the development sub-keys (cache_read_input_tokens,
# cache_write_input_tokens, reasoning_tokens) into this same file.
#
# Per the MDX: prefer `input_tokens` / `output_tokens` in new instrumentation;
# `prompt_tokens` / `completion_tokens` remain stable for backwards
# compatibility. Both pairs are stored when the source attribute is present.

groups:
  - id: registry.honeyhive.metadata.tokens
    type: attribute_group
    display_name: HoneyHive Metadata Bucket тАФ Token Counts
    brief: >
      Token-count sub-keys of the `metadata` bucket. Aggregated into
      session-level totals by the writer's session aggregator and stored
      in `session_aggregates`; the Session Summary "Total Tokens" stat
      reads the aggregated value. All attributes in this group are stable.
    attributes:
      - id: honeyhive.metadata.prompt_tokens
        type: int
        stability: stable
        requirement_level: recommended
        brief: >
          Input/prompt token count (legacy alias for `input_tokens`). Mapped
          from `gen_ai.usage.prompt_tokens` and `llm.token_count.prompt`.
          Stored alongside `input_tokens` when both source attributes are
          present.
        examples:
          - 512

      - id: honeyhive.metadata.input_tokens
        type: int
        stability: stable
        requirement_level: recommended
        brief: >
          Input/prompt token count (OTel v1.36+ canonical name). Mapped from
          `gen_ai.usage.input_tokens`. Preferred over `prompt_tokens` in new
          instrumentation; stored alongside it when both source attributes
          are present.
        examples:
          - 512

      - id: honeyhive.metadata.completion_tokens
        type: int
        stability: stable
        requirement_level: recommended
        brief: >
          Output/completion token count (legacy alias for `output_tokens`).
          Mapped from `gen_ai.usage.completion_tokens` and
          `llm.token_count.completion`. Stored alongside `output_tokens`
          when both source attributes are present.
        examples:
          - 256

      - id: honeyhive.metadata.output_tokens
        type: int
        stability: stable
        requirement_level: recommended
        brief: >
          Output/completion token count (OTel v1.36+ canonical name). Mapped
          from `gen_ai.usage.output_tokens`. Preferred over
          `completion_tokens` in new instrumentation; stored alongside it
          when both source attributes are present.
        examples:
          - 256

      - id: honeyhive.metadata.total_tokens
        type: int
        stability: stable
        requirement_level: recommended
        brief: >
          Total token count. Auto-computed by the normalizer from
          `prompt_tokens + completion_tokens` (or `input_tokens +
          output_tokens`) when not explicitly set. Source for the
          "Total Tokens" stat in Session Summary.
        examples:
          - 768
