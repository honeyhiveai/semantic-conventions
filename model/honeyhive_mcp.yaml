# HoneyHive metadata.* sub-keys carrying Model Context Protocol (MCP)
# span context. Set on spans emitted by MCP-aware instrumentations
# (OpenInference, standard-genai). All attributes here are development
# tier — not safe for evaluator configuration, dashboards, or saved
# filters until promoted.
groups:
  - id: registry.honeyhive.metadata.mcp
    type: attribute_group
    display_name: HoneyHive MCP Attributes
    brief: >
      Canonical honeyhive.metadata.mcp_* attributes set by the ingestion
      normalizer when the source span is an MCP client/server invocation.
      Render in the Metadata sideview section. Every attribute in this
      group is development tier.
    attributes:
      - id: honeyhive.metadata.mcp_client_name
        type: string
        stability: development
        requirement_level: opt_in
        brief: 'MCP client name attached to the span by the MCP-aware instrumentation.'
        examples:
          - 'honeyhive-client'
          - 'cursor'
        note: >
          Routed into the metadata bucket. No corresponding stable attribute
          exists in OTel GenAI v1.36 or v1.37; HoneyHive normalizes from the
          OpenInference and standard-genai source attributes that carry the
          client name on the MCP-tool-call span.
        annotations:
          source_mapping:
            otel_genai: null
            openinference: mcp.client.name
            traceloop: null

      - id: honeyhive.metadata.mcp_server_name
        type: string
        stability: development
        requirement_level: opt_in
        brief: 'MCP server name attached to the span by the MCP-aware instrumentation.'
        examples:
          - 'filesystem'
          - 'github'
        note: >
          Routed into the metadata bucket. No stable cross-ecosystem source.
        annotations:
          source_mapping:
            otel_genai: null
            openinference: mcp.server.name
            traceloop: null

      - id: honeyhive.metadata.mcp_tool_name
        type: string
        stability: development
        requirement_level: opt_in
        brief: 'MCP tool name being invoked on the MCP server.'
        examples:
          - 'read_file'
          - 'list_repositories'
        note: >
          Distinct from `config.tool_name` and `metadata.tool_name` — those
          carry the framework-level tool identity. `mcp_tool_name` carries
          the tool identifier as exposed by the MCP server.
        annotations:
          source_mapping:
            otel_genai: null
            openinference: mcp.tool.name
            traceloop: null

      - id: honeyhive.metadata.mcp_request_type
        type: string
        stability: development
        requirement_level: opt_in
        brief: 'MCP request kind (e.g., `tool_call`, `list_tools`, `read_resource`).'
        examples:
          - 'tool_call'
          - 'list_tools'
          - 'read_resource'
        annotations:
          source_mapping:
            otel_genai: null
            openinference: mcp.request.type
            traceloop: null

      - id: honeyhive.metadata.mcp_session_id
        type: string
        stability: development
        requirement_level: opt_in
        brief: 'MCP-protocol session identifier; distinct from the HoneyHive root `session_id`.'
        examples:
          - 'mcp-sess-7f3a9c'
        note: >
          Does not override the root `session_id` field used for trace
          grouping. Stored alongside it for protocol-level diagnostics.
        annotations:
          source_mapping:
            otel_genai: null
            openinference: mcp.session.id
            traceloop: null
