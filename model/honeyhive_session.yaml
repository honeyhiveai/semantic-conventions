# Root span fields. These are NOT inside one of the seven HoneyHive buckets
# (inputs, outputs, config, metadata, metrics, feedback, user_properties) —
# they sit at the top of every event. Source of truth: PR #273
# (honeyhiveai/honeyhive-ai-docs, branch feat/HHAI-4834-semconv-followup-feedback,
# v2/tracing/semconv-reference.mdx → "Root Field Behaviors").
#
# HHAI-5104 owns the stable subset. HHAI-5105 will add development root-field
# attributes (if any) into this same file per the file-per-bucket convention.

groups:
  - id: registry.honeyhive.session
    type: attribute_group
    display_name: HoneyHive Root Span Attributes
    brief: >
      Top-level fields stored directly on every HoneyHive event. Drive trace
      tree rendering, sideview headers, timeline positioning, and error
      indicators. All attributes in this group are stable and safe to
      reference in evaluator configuration, dashboards, and saved filters.
    attributes:
      - id: honeyhive.session_id
        type: string
        stability: stable
        requirement_level: recommended
        brief: >
          Session grouping identifier. Links every span emitted within one
          end-to-end invocation; routes ingested events into the same session
          tree, timeline, graph, and trajectory views.
        examples:
          - 'a1b2c3d4-5e6f-7890-abcd-ef0123456789'

      - id: honeyhive.event_type
        type:
          members:
            - id: session
              value: 'session'
              brief: 'Top-level session/conversation span. Enables Session Summary panel and Composite Evaluations section.'
              stability: stable
            - id: model
              value: 'model'
              brief: 'LLM completion span. Renders the "Open in Playground" sideview button.'
              stability: stable
            - id: tool
              value: 'tool'
              brief: 'Tool / function-call span. Standard sideview layout.'
              stability: stable
            - id: chain
              value: 'chain'
              brief: 'Generic chain or sub-step span. Standard sideview layout.'
              stability: stable
        stability: stable
        requirement_level: recommended
        brief: >
          Event classification. Drives icon, color coding, and available
          sideview affordances. Trajectory view filters out `session` (and
          legacy `conversation`) values when grouping non-session events.

      - id: honeyhive.event_name
        type: string
        stability: stable
        requirement_level: recommended
        brief: >
          Human-readable span title shown in the trace tree, sideview header,
          timeline, and trajectory view (as a fallback label when no agent /
          tool / model name is found).
        examples:
          - 'openai.chat.completion'
          - 'retrieve_documents'
          - 'agent.plan_step'

      - id: honeyhive.error
        type: string
        stability: stable
        requirement_level: opt_in
        brief: >
          Error message captured if the traced function raised. When non-null
          and non-empty, renders a red error panel at the top of the Output
          section and flips the trace-tree node from green checkmark to red X.
          The error string is JSON-stringified before display.
        examples:
          - 'Connection timed out after 30s'
          - 'Tool input failed schema validation: missing field "user_id"'

      - id: honeyhive.parent_id
        type: string
        stability: stable
        requirement_level: recommended
        brief: >
          Parent span identifier. Used to build the trace tree and to
          determine sibling relationships (controls prev/next navigation
          between sibling spans in the sideview).
        examples:
          - 'a1b2c3d4-5e6f-7890-abcd-ef0123456789'

      - id: honeyhive.start_time
        type: int
        stability: stable
        requirement_level: required
        brief: >
          Span start timestamp in Unix milliseconds. Children within a session
          are sorted by `start_time` ascending before trace tree rendering;
          also displayed as the event timestamp in the table and sideview
          header, and used by the trajectory view to build the left-to-right
          step sequence.
        examples:
          - 1714492800123

      - id: honeyhive.duration
        type: double
        stability: stable
        requirement_level: recommended
        brief: >
          Wall-clock duration in milliseconds. Displayed as the "Latency"
          column in the events table and as the duration badge on each trace
          tree node. Computed automatically from `end_time - start_time` if
          not set explicitly.
        examples:
          - 1234.5
