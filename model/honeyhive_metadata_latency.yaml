# `metadata` bucket ‚Äî latency sub-keys. Source: PR #273
# v2/tracing/semconv-reference.mdx ‚Üí "`metadata` Bucket ‚Üí Latency".
# HHAI-5104 owns the two explicitly-stable sub-keys (latency_ms,
# time_to_first_token_ms). No development latency sub-keys exist;
# HHAI-5105 will only touch this file if a new dev attribute is added.
#
# Note from the MDX: `metadata.latency_ms` was historically also set in
# `metrics.latency_ms` by older Traceloop strategy versions; check both
# locations for older data. Newer ingestion writes to `metadata` only.

groups:
  - id: registry.honeyhive.metadata.latency
    type: attribute_group
    display_name: HoneyHive Metadata Bucket ‚Äî Latency
    brief: >
      Latency sub-keys of the `metadata` bucket. Both attributes in this
      group are stable.
    attributes:
      - id: honeyhive.metadata.latency_ms
        type: double
        stability: stable
        requirement_level: recommended
        brief: >
          End-to-end request latency in milliseconds. Distinct from the root
          `duration` field (which is wall-clock for the entire span);
          `latency_ms` reflects the underlying API call latency reported by
          the instrumentation.
        examples:
          - 1234.5

      - id: honeyhive.metadata.time_to_first_token_ms
        type: double
        stability: stable
        requirement_level: opt_in
        brief: >
          Time to first streaming token in milliseconds. Reported by
          instrumentations that observe streamed responses.
        examples:
          - 187.3
