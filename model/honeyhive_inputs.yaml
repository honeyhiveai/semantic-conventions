# `inputs` bucket — input data passed into the span (prompts, queries,
# messages). Source: PR #273 v2/tracing/semconv-reference.mdx → "`inputs`
# Bucket". Only `inputs.chat_history` carries an explicit stable stability
# annotation in the MDX; other well-known sub-keys (query, chunks, nodes,
# parameters, tool_arguments, tool_name, user_message, system_context,
# user_id, session_id) are listed without stability annotations and treated
# as development-tier per the MDX "Stability Levels" rule.
#
# HHAI-5105 will add development inputs.* attributes into this same file.

groups:
  - id: registry.honeyhive.inputs
    type: attribute_group
    display_name: HoneyHive Inputs Bucket Attributes
    brief: >
      Sub-keys of the `inputs` bucket that drive special platform rendering
      (Chat History tab, template substitution). All attributes in this
      group are stable.
    attributes:
      - id: honeyhive.inputs.chat_history
        type: string
        stability: stable
        requirement_level: opt_in
        brief: >
          Message thread array. Triggers the dedicated Chat History tab in
          the Input section of the sideview (excluded from the general Inputs
          key-value view); rendered via OpenAIChatRenderer. When
          `config.template` is also present, the first `template.length`
          messages are rendered as template messages with `{{variable}}`
          substitution. Expected format: array of message objects with at
          minimum a `role` field and one of `content`, `value`, `tool_calls`,
          or `function_call`. Stored as JSON when transported via OTLP.
        examples:
          - '[{"role":"user","content":"Hello"},{"role":"assistant","content":"Hi there!"}]'
