# `config` bucket — model and tool configuration. Source: PR #273
# v2/tracing/semconv-reference.mdx → "`config` Bucket". HHAI-5104 owns the
# three explicitly-stable sub-keys (model, provider, template). HHAI-5105
# will add the development sub-keys (temperature, max_tokens,
# max_output_tokens, top_p, top_k, frequency_penalty, presence_penalty,
# stop_sequences, seed, reasoning_effort, system, system_instructions,
# system_instruction, tools, destination, plus `tool_name` and
# `tool_description` from the alignment doc) into this same file.

groups:
  - id: registry.honeyhive.config
    type: attribute_group
    display_name: HoneyHive Config Bucket Attributes
    brief: >
      Sub-keys of the `config` bucket that identify the model + provider and
      drive Template-section rendering with `{{variable}}` substitution. All
      attributes in this group are stable.
    attributes:
      - id: honeyhive.config.model
        type: string
        stability: stable
        requirement_level: recommended
        brief: >
          Model identifier used for the call. Read by the Playground when
          loading an event for replay; also used by the Trajectory view as a
          category label fallback.
        examples:
          - 'gpt-4o'
          - 'claude-3-5-sonnet-20241022'
          - 'gemini-1.5-pro'

      - id: honeyhive.config.provider
        type: string
        stability: stable
        requirement_level: recommended
        brief: >
          Provider name. Read by the Playground when loading an event for
          replay; mirrors `metadata.provider` (set from the source `gen_ai.system`
          attribute or its v1.37+ `gen_ai.provider.name` successor).
        examples:
          - 'openai'
          - 'anthropic'
          - 'bedrock'
          - 'google'

      - id: honeyhive.config.template
        type: string
        stability: stable
        requirement_level: opt_in
        brief: >
          Prompt template. When set as an array of template message objects
          (each with `role` and `content`), the sideview renders a Template
          section above the chat history and substitutes `{{variableName}}`
          placeholders with matching keys from `inputs` (non-chat-history
          inputs); `template.length` also controls how many leading messages
          in `inputs.chat_history` are skipped by the main chat renderer.
          May alternatively be an object with `name`, `version`, and
          `content` sub-keys. Stored as JSON when transported via OTLP.
        examples:
          - '[{"role":"system","content":"You are an assistant. User name: {{user_name}}."}]'
          - '{"name":"customer_support_v2","version":"3","content":"..."}'
