# HoneyHive metadata.* development-tier multimodal MIME-type sub-keys.
groups:
  - id: registry.honeyhive.metadata.multimodal
    type: attribute_group
    display_name: HoneyHive Multimodal Attributes
    brief: >
      Development-tier metadata.* MIME-type attributes describing the
      input and output modalities of multimodal spans (vision, audio,
      embedded files). Render in the Metadata sideview section.
    attributes:
      - id: honeyhive.metadata.input_mime_type
        type: string
        stability: development
        requirement_level: opt_in
        brief: 'MIME type of the input payload.'
        examples:
          - 'text/plain'
          - 'image/jpeg'
          - 'application/json'
        annotations:
          source_mapping:
            otel_genai: null
            openinference: input.mime_type
            traceloop: null

      - id: honeyhive.metadata.output_mime_type
        type: string
        stability: development
        requirement_level: opt_in
        brief: 'MIME type of the output payload.'
        examples:
          - 'text/plain'
          - 'application/json'
        annotations:
          source_mapping:
            otel_genai: null
            openinference: output.mime_type
            traceloop: null
