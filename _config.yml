title: HoneyHive Semantic Conventions
description: Canonical attribute reference for the HoneyHive ingestion pipeline.
url: https://honeyhiveai.github.io
baseurl: /semantic-conventions
lang: en

# Source the rendered markdown out of dist/ (gitignored, produced by `make build`).
# Layouts, includes, and assets live at the repo root.
include:
  - dist

exclude:
  - bin
  - install.sh
  - Makefile
  - model
  - templates
  - vendor
  - SPIKE.md
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - .gitignore
  - .github

# Markdown / Liquid handling.
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  syntax_highlighter: rouge

# Plugins also available on github-pages so HHAI-5108's deploy workflow
# can mirror this exact build without surprise.
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Apply the branded layout to every generated page.
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Brand metadata surfaced into the layout.
brand:
  primary: "#b45f06"
  primary_dark: "#f88707"
  bg_light: "#ffffff"
  bg_dark: "#0f0f0f"
  font_family: "Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"

# GitHub repo link rendered in the header / footer.
github:
  repository_url: https://github.com/honeyhiveai/semantic-conventions
