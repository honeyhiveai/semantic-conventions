name: Build and deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'model/**'
      - 'templates/**'
      - 'Makefile'
      - 'install.sh'
      - '.github/workflows/build-and-deploy-pages.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip the deploy step. The build artifact is still uploaded for inspection.'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Validate + build registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install weaver
        run: bash install.sh

      - name: Validate registry (make check)
        run: make check

      - name: Build registry site (make build)
        run: make build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: ${{ inputs.dry_run != true }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
